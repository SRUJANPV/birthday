<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Birthday Surprise 📱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #e9d5ff 50%, #fce7f3 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(217, 70, 166, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #d946a6;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(217, 70, 166, 0.1);
        }

        .subtitle {
            color: #a855a8;
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-style: italic;
        }

        #qrcode {
            display: inline-block;
            padding: 20px;
            background: linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%);
            border: 3px solid #d946a6;
            border-radius: 20px;
            margin: 30px 0;
            animation: qrPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes qrPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #qrcode img {
            display: block;
            margin: 0 auto;
        }

        .instructions {
            margin: 40px 0;
            padding: 20px;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.05) 0%, rgba(192, 132, 252, 0.05) 100%);
            border-left: 4px solid #d946a6;
            border-radius: 10px;
            text-align: left;
            color: #5a4a6f;
            line-height: 1.8;
        }

        .instructions h3 {
            color: #d946a6;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .instructions ol {
            margin-left: 20px;
            color: #7c3aed;
        }

        .instructions li {
            margin-bottom: 10px;
        }

        .url-box {
            background: #f3e8ff;
            padding: 15px;
            border-radius: 10px;
            margin: 30px 0;
            word-break: break-all;
            color: #7c3aed;
            font-weight: bold;
            font-size: 0.95rem;
            border: 2px dashed #c084fc;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(217, 70, 166, 0.3);
        }

        .btn-download {
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
        }

        .btn-print {
            background: linear-gradient(135deg, #c084fc 0%, #a855a8 100%);
            color: white;
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }

        .btn-visit {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
        }

        .btn-visit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.5);
        }

        .emoji {
            font-size: 1.5rem;
            margin: 0 5px;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .footer {
            margin-top: 40px;
            color: #a855a8;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        @media print {
            body {
                background: white;
            }

            .hearts {
                display: none;
            }

            .button-group {
                display: none;
            }

            .instructions {
                display: none;
            }

            .container {
                box-shadow: none;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <h1>🎉 Birthday Surprise 🎉</h1>
        <p class="subtitle">Scan to open your special gift</p>

        <!-- QR CODE WILL BE GENERATED HERE -->
        <div id="qrcode"></div>

        <div class="url-box">
            <strong>Website URL:</strong><br>
            https://birthday-lake-tau-98.vercel.app/
        </div>

        <div class="instructions">
            <h3><span class="emoji">📱</span>How to scan:</h3>
            <ol>
                <li>Open your phone camera</li>
                <li>Point it at this QR code</li>
                <li>Tap the notification that appears</li>
                <li>Enjoy the surprise! 🎁</li>
            </ol>
        </div>

        <div class="button-group">
            <button class="btn-download" onclick="downloadQR()">
                <span class="emoji">⬇️</span>Download QR Code
            </button>
            <button class="btn-print" onclick="window.print()">
                <span class="emoji">🖨️</span>Print This Page
            </button>
            <button class="btn-visit" onclick="window.location.href='https://birthday-lake-tau-98.vercel.app/'">
                <span class="emoji">🎁</span>Visit Website
            </button>
        </div>

        <div class="footer">Made with 💕 for your special day</div>
    </div>

    <script>
        // Generate QR Code
        const qrCodeElement = document.getElementById('qrcode');
        new QRCode(qrCodeElement, {
            text: "https://birthday-lake-tau-98.vercel.app/",
            width: 280,
            height: 280,
            colorDark: "#d946a6",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Download QR Code as Image
        function downloadQR() {
            const canvas = qrCodeElement.querySelector('canvas');
            const image = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = image;
            link.download = 'birthday-qr-code.png';
            link.click();
        }

        // Floating hearts animation
        function createFloatingHeart() {
            const hearts = ['💕', '🌸', '💌', '✨'];
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('hearts').appendChild(heart);

            setTimeout(() => heart.remove(), 9000);
        }

        // Create hearts every 600ms
        setInterval(createFloatingHeart, 600);
    </script>
</body>
</html>
